<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
  
    /* 모든 자손 p 태그를 파란색으로 설정 */
    div p {
      color: blue;
      margin-bottom: 20px;
    }

    /* 직계 자식인 p 태그만 크림슨(빨간색 계열)으로 덮어씌움 */
    div > p {
      color: crimson;
    }
    span {
        display: block;
        margin-left: 40px;
    }
  </style>
</head>
<body>

  <div>
    <p>자식</p> <span>
      <p>손자</p> </span>
    
    <p>자식</p> </div>

</body>
</html>
