<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>

    div > div {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    div > div > img {
      width: 100%;
      display: block;
    }

    div > div > p {
      position: absolute;
      bottom: 0;
      left: 5%;
      width: 90%;
      margin: 0;
      padding: 0;
      background-color: rgb(246, 198, 156);
      text-align: center;
      font-size: 35px;
      font-weight: bold;
    }
    .card {
      width: 400px;
      border: 1px solid black;
      margin: 50px auto;
      font-family: sans-serif;
    }

    .image-container {
      position: relative;
      width: 100%;
      /* height: 200px; */
      overflow: hidden;
    }

    .image-container img {
      width: 100%;
      /* height: auto; */
      display: block;
    }

    .name {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      margin: 0;
      padding: 15px 0;
      background-color: coral;
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      color: black;

    }

    .description {
      padding: 20px;
      line-height: 1.6;
      font-size: 1.1rem;
      color: #333;

    }
  </style>
</head>

<body>
  <div class="card">
    <div class="image-container">

      <img src="profile.jpg" alt="Profile Image">
      <p>Name</p>
    </div>
    <p class="description">Lorem ipsum dolor sit amet consectetur adipisicing elit. Adipisci unde officiis ad nostrum. Laboriosam mollitia
      similique provident fuga tenetur saepe sit, amet eaque neque eius quaerat expedita ea illum veniam.</p>
  </div>
</body>

</html>
