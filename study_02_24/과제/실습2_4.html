<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .outer-box {
      width : 400px;
      height: 200px;
      border: 2px solid black;
      color: red ;
      text-align: center;
    }

		/* 추가 css 코드 작성 1 */
		
    
    .inner-box {
      
      width : 200px;
      height: 100px;
      /* inherit = 부모속성을 상속받음. border는 기본적으로 상속되는 것이 아니기때문에, 강제 상속 필요*/
      border: inherit;
      /* 상속 끊기 */
      text-align: initial;;
      /* color: red; */

			/* 추가 css 코드 작성 2 */
			
    }
    /* 2개의 span에 상속받는 것을 조절? */
    /* 첫번째 span=> 부모 속성을 그대로 사용 */
    .outer-box div:first-child span {
      color: inherit;
      text-align: inherit;
    }

    /* 두번째 span=> 부모 속성을 상속받지 않음 
    상속을 끊기 위해 initial을 사용 */
    .inner-box span {
      color: initial;
      /* text-align: initial; */
    }      


  </style>
</head>
<body>
  <div class="outer-box">
    <div>
      <span>첫 번째</span>
    </div>
    <div class="inner-box">
      <span>두 번째</span>
    </div>
  </div>
</body>
</html>
