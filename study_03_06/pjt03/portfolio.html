<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>금융 포트폴리오 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* 기본 스타일 및 네비게이션 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        /* [수정] position: relative 추가하여 버튼의 기준점 설정 */
        .nav-header {
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 20px 0;
            position: relative; 
        }

        .nav-header h2 { margin: 0; font-size: 1.5rem; }

        /* [추가] Home 버튼 상세 위치 조정 */
        .home-btn {
            position: absolute;
            top: 15px;      /* 버튼을 위로 올림 */
            right: 20px;
            color: #007bff !important; /* 글자색을 헤더 배경색과 맞춤 */
            border: none;
            transition: transform 0.2s;
        }

        .home-btn:hover {
            transform: scale(1.05);
            background-color: white;
        }

        .nav-links {
            background-color: white;
            border-bottom: 1px solid #ddd;
            text-align: center;
            padding: 15px 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            margin: 0 20px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .nav-links a:hover { color: darkcyan; }
        .nav-links a.active { color: darkcyan; border-bottom: 2px solid darkcyan; padding-bottom: 5px; }

        /* 메인 콘텐츠 영역 */
        .container {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .main-card {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 15px;
            width: 850px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 { text-align: center; margin-bottom: 40px; font-size: 1.8rem; color: #333; }

        .portfolio-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #333;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .p-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            background-color: #f8f9fa;
            font-size: 0.95rem;
        }

        .p-input[readonly] {
            background-color: #e9ecef;
            color: #6c757d;
            cursor: not-allowed;
        }

        .p-input:not([readonly]) {
            background-color: #fff;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            padding: 5px 0;
        }

        .radio-group label {
            font-weight: normal;
            margin: 0;
            cursor: pointer;
        }

        .submit-container {
            margin-top: 30px;
            text-align: center;
        }

        .final-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 80px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 184, 230, 0.2);
        }
    </style>
</head>
<body>

<header class="nav-header">
    <h2>하치와레 님의 프로필 페이지</h2>
    <a href="main.html" class="home-btn btn btn-light btn-sm rounded-pill shadow-sm d-flex align-items-center">
        <i class="bi bi-house-door-fill me-1"></i> 
        <span class="fw-bold">Home</span>
    </a>
</header>

<nav class="nav-links">
    <a href="./user_info.html">기본 정보 수정</a>
    <a href="#" class="active">포트폴리오 수정</a> 
</nav>

<div class="container">
    <div class="main-card">
        <h1>포트폴리오 수정</h1>

        <form class="portfolio-form">
            <div class="form-group">
                <label>회원 번호</label>
                <input type="text" class="p-input" value="001" readonly>
            </div>

            <div class="form-group">
                <label>ID</label>
                <input type="text" class="p-input" value="user_id" readonly>
            </div>

            <div class="form-group">
                <label>저축 성향</label>
                <div class="input-row">
                    <div class="radio-group">
                        <input type="radio" name="saving" id="type1"> <label for="type1">도전형</label>
                        <input type="radio" name="saving" id="type2"> <label for="type2">검소형</label>
                        <input type="radio" name="saving" id="type3"> <label for="type3">알뜰형</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>최애 은행</label>
                <div class="input-row">
                    <input type="text" class="p-input" placeholder="가장 좋아하는 은행을 입력해주세요">
                </div>
            </div>

            <div class="submit-container">
                <button type="submit" class="final-btn">포트폴리오 저장 완료</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
