<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>금융 포트폴리오 관리</title>
    <style>
        /* 기본 스타일 및 네비게이션 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        .nav-header {
            background-color: #00b8e6;;
            color: white;
            text-align: center;
            padding: 20px 0;
        }

        .nav-header h2 { margin: 0; font-size: 1.5rem; }

        .nav-links {
            background-color: white;
            border-bottom: 1px solid #ddd;
            text-align: center;
            padding: 15px 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            margin: 0 20px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .nav-links a:hover { color: darkcyan; }
        .nav-links a.active { color: darkcyan; border-bottom: 2px solid darkcyan; padding-bottom: 5px; }

        /* 메인 콘텐츠 영역 */
        .container {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .main-card {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 15px;
            width: 850px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 { text-align: center; margin-bottom: 40px; font-size: 1.8rem; color: #333; }

        /* [F 304] 포트폴리오 폼 레이아웃 */
        .portfolio-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #333;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* 공통 입력 필드 스타일 */
        .p-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            background-color: #f8f9fa;
            font-size: 0.95rem;
        }

        /* 편집 불가 필드 (회원 번호, ID) */
        .p-input[readonly] {
            background-color: #e9ecef;
            color: #6c757d;
            cursor: not-allowed;
        }

        /* 최애 은행 등 텍스트 입력 필드 */
        .p-input:not([readonly]) {
            background-color: #fff;
        }

        /* 저축 성향 라디오 그룹 */
        .radio-group {
            display: flex;
            gap: 20px;
            padding: 5px 0;
        }

        .radio-group label {
            font-weight: normal;
            margin: 0;
            cursor: pointer;
        }

        /* 개별 업데이트 버튼 */
        .update-btn {
            background-color: #00d2ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .update-btn:hover {
            background-color: #00b8e6;
        }

        /* 전체 수정 완료 버튼 */
        .submit-container {
            margin-top: 30px;
            text-align: center;
        }

        .final-btn {
            background-color: #00b8e6; ;
            color: white;
            border: none;
            padding: 15px 80px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2);
        }
    </style>
</head>
<body>

<header class="nav-header">
    <h2>하치와레 님의 프로필 페이지</h2>
</header>
<nav class="nav-links">
    <a href="./practice.html">기본 정보 수정</a>
    <a href="#" class="active">포트폴리오 수정</a> </nav>

<div class="container">
    <div class="main-card">
        <h1>포트폴리오 수정</h1>

        <form class="portfolio-form">
            <div class="form-group">
                <label>회원 번호</label>
                <input type="text" class="p-input" value="001" readonly>
            </div>

            <div class="form-group">
                <label>ID</label>
                <input type="text" class="p-input" value="user_id" readonly>
            </div>

            <div class="form-group">
                <label>저축 성향</label>
                <div class="input-row">
                    <div class="radio-group">
                        <input type="radio" name="saving" id="type1"> <label for="type1">도전형</label>
                        <input type="radio" name="saving" id="type2"> <label for="type2">검소형</label>
                        <input type="radio" name="saving" id="type3"> <label for="type3">알뜰형</label>
                    </div>
                    <!-- <button type="button" class="update-btn">Update</button> -->
                </div>
            </div>

            <div class="form-group">
                <label>최애 은행</label>
                <div class="input-row">
                    <input type="text" class="p-input" placeholder="가장 좋아하는 은행을 입력해주세요">
                    <!-- <button type="button" class="update-btn">Update</button> -->
                </div>
            </div>

            <div class="submit-container">
                <button type="submit" class="final-btn">포트폴리오 저장 완료</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
