<!-- Bootstrap 
 - CSS 프레임 워크 => 과목평가 문제
  - Reset CSS 
    - 브라우저마다 기본 디자인이 다르다 (ex. 크롬은 기본적으로 8마진이 셋팅임)
    - 초기화 사켜주고 시작
 - 어떻게 우리가 남의 코드를 가져와서 썼는가?
  - 기존: 설치하고 코드에서 불러오기(ex.pip install)
    - 프레임 워크는 무겁다
    - 버전 업그레이드하면 다시 설치
  - 파일을 실행했을 때 실시간으로 가져올 수 없을까?
    -> 서버와의 거리가 멀수록 설치 시간이 오래걸림.
    - CDN
      - 전세계에 여러 서버를 두고 가장 가까운 서버로 부터 설치할 수 있도록 하는 기술
 - Bootstrap CDN
  - min.*(개발자 상식) : 컴퓨터에게 필요없는 (사람에게만 필요한) 개행 등의 문자를 모두 제거한, 최적화 버전의 파일 ()  

 - 라이브러리
  - 우리가 흐름을 만들고, 기능을 가져오는 식으로 활용
 - 프레임 워크
  - 흐름을 프레임워크가 만들어 놓고, 우리가 추가하는 식으로 활용
  - 프레임워크가 정해진 규칙(공식문서)대로 개발을 해야 함.

  챗봇
   - 단순히 우리와 대화

  에이전트
   - 챗봇 + tools (ReAct): 툴 선택하는 과정
  
  코딩 에이전트
  코딩 특화

  기획자 (마케팅)설계 파트
  -> 에이전트가 못함. 프론트: 사람과 가까워질수록

  개발자로서 설계
    - 기술 스택
    - 아키텍터 설계
    -> 에이전트가 잘함

  어떤 디자인이 사람들한테 먹힐까?
    - 색상
    - 레이아웃 
  반응형 웹 
  gird : 12개로 나뉨?
  
 -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    /* Kid-friendly navbar styles */
    body {
      font-family: 'Baloo 2', cursive;
      background: linear-gradient(180deg, #fffdf6 0%, #f9f6ff 100%);
    }
    .kid-navbar {
      background: linear-gradient(90deg,#FFD3B6 0%, #FFAAA5 50%, #FDFFB6 100%);
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      margin: 18px 12px;
      padding: 6px 12px;
    }
    .kid-navbar .navbar-brand {
      background: #ffffffcc;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 1.45rem;
      color: #6b2e6b;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 10px rgba(107,46,107,0.12);
    }
    .kid-navbar .nav-link {
      color: #5b2c6f;
      font-weight: 700;
      margin-right: 6px;
      padding: 6px 10px;
      border-radius: 10px;
      transition: transform .12s ease, background .12s ease;
    }
    .kid-navbar .nav-link:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.8);
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
      color: #3a164a;
    }
    .kid-navbar .dropdown-menu {
      border-radius: 10px;
      border: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .search-btn {
      background: linear-gradient(90deg,#6EE7B7,#8B5CF6);
      border: none;
      color: white;
      font-weight: 700;
      border-radius: 10px;
      padding: 6px 10px;
      box-shadow: 0 6px 12px rgba(139,92,246,0.18);
    }
    .toggler-emoji {
      font-size: 1.25rem;
      line-height: 1;
      display: inline-block;
      padding: 6px 8px;
      background: rgba(255,255,255,0.9);
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
    }
    @media (max-width: 576px) {
      .kid-navbar { margin: 10px; }
      .kid-navbar .navbar-brand { font-size: 1.2rem; }
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg kid-navbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">🌈 놀이네비</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="toggler-emoji" aria-hidden="true">🍭</span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">🏠 홈</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">🎮 게임</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">📚 이야기</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              ✨ 더보기
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">🎵 노래</a></li>
              <li><a class="dropdown-item" href="#">🎨 그림</a></li>
              <li><a class="dropdown-item" href="#">🧩 퍼즐</a></li>
              <li>
                <hr class="dropdown-divider">
              </li>
              <li><a class="dropdown-item" href="#">🎁 선물</a></li>
            </ul>
          </li>
        </ul>
        <form class="d-flex" role="search">
          <input class="form-control me-2" type="search" placeholder="검색해봐요" aria-label="Search" />
          <button class="btn search-btn" type="submit">🔍 찾기</button>
        </form>
      </div>
    </div>
  </nav>
  <div>안녕하세요</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
