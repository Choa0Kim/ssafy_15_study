<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Login Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            width: 100%;
            max-width: 600px;     
    }
        /* 입력창 중앙 정렬 유지
        .form-control {
            text-align: center;
        } */
    </style>
</head>

<body>
    <div class="card">
        <!-- <div class="card-header">로그인</div> -->
        <!-- <div class="card-body fw-semibold"> -->
            <!-- <h2 class="card-title fw-bold mb-4">로그인 시스템</h2> -->
            <!-- <p class="card-text">아래 버튼을 클릭하여 로그인을 진행해 주세요.</p> -->
            <button type="button" class="btn btn-primary px-4" data-bs-toggle="modal" data-bs-target="#loginModal">
                로그인
            </button>
        </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered"> <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title w-100 fw-bold" id="loginModalLabel">로그인</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body fw-semibold">
                    <div class="input-container">
                        <div class="mb-3">
                            <label for="email-input" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="email-input" placeholder="name@example.com">
                        </div>

                        <div class="mb-3">
                            <label for="inputPassword5" class="form-label">Password</label>
                            <input type="password" id="inputPassword5" class="form-control">
                            <div id="passwordHelpBlock" class="form-text mt-3 fw-normal">
                                비밀번호 구성은 8자리 이상, 영문 대소문자, 숫자, 특수문자를 사용하세요.
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-primary">로그인</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
