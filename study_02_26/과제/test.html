<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Login Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* [1] 이미지와 유사한 배경색 설정 */
        body {
            /* background-color: #888; */
            padding: 20px;
        }

        /* [2] 카드의 불필요한 테두리를 없애고 배경 투명화 (이미지 느낌 재현) */
        .card {
            border: none;
            background: transparent;
        }

        /* [3] 라벨을 약간 굵게 */
        .form-label {
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card-body p-0">
            <button type="button" class="btn btn-primary px-4" data-bs-toggle="modal" data-bs-target="#loginModal">
                로그인
            </button>
        </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="loginModalLabel">로그인</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body fw-semibold">
                    <div class="input-container text-start"> <div class="mb-3">
                            <label for="email-input" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="email-input" placeholder="name@example.com">
                        </div>

                        <div class="mb-3">
                            <label for="inputPassword5" class="form-label">Password</label>
                            <input type="password" id="inputPassword5" class="form-control">
                            <div id="passwordHelpBlock" class="form-text mt-2 fw-normal">
                                비밀번호 구성은 8자리 이상, 영문 대소문자, 숫자, 특수문자를 사용하세요.
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary px-3" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary px-3">로그인</button>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
