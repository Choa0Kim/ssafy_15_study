<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAFY Gitlab Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; }
        .login-container { max-width: 450px; margin-top: 50px; }
        /* 요구사항: 빨간색 Alert창 스타일 커스텀 */
        .alert-danger-custom {
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        /* 요구사항: 가득 차는 초록색 버튼 */
        .btn-gitlab {
            background-color: #1b8a5a;
            color: white;
            font-weight: bold;
        }
        .btn-gitlab:hover { background-color: #146c46; color: white; }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="alert alert-danger-custom py-3 mb-4 fw-light" role="alert">
        Invalid Login or password
    </div>

    <h1 class="text-center fw-bold mb-2 display-5">SSAFY 전용 Gitlab 시스템</h1>
    <hr class="mb-4">

    <div class="card">
        <div class="card-header bg-white text-center py-3 border-bottom border-primary border-2">
            <h5 class="mb-0 fw-bold">Sign in</h5>
         
        </div>

        <div class="card-body px-4 pb-4">
            <form>
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">Username or Email</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label text-secondary" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="#" class="text-decoration-none" style="color: #4a90e2;">Forgot your password?</a>
                </div>

                <button type="submit" class="btn btn-gitlab w-100 py-2 fw-light">Sign in</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
